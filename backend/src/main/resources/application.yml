# spring.application.name=evalhub
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/evaluation_platform
    username: admin
    password: password123
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

evalhub:
  storage:
    attachments-path: uploads/attachments
